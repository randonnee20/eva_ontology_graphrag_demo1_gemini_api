services:
  - type: web
    name: eva-graphrag
    env: python
    region: singapore   # 한국과 가장 가까운 리전
    plan: free          # 유료로 변경 시 persistent disk 사용 가능

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: >
      python startup.py &&
      streamlit run ui/app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true

    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Render 대시보드에서 직접 입력
      - key: DAILY_LIMIT
        value: "20"
      - key: PYTHONUNBUFFERED
        value: "1"

    # ⚠️ Free 플랜은 파일시스템이 ephemeral (재시작 시 초기화)
    # data/embeddings, data/graph는 재시작 시 재생성됨
    # data/raw는 Git에 포함되므로 항상 유지됨
    #
    # 영구 저장이 필요하면 아래 주석 해제 (유료 플랜 필요):
    # disk:
    #   name: eva-data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
